{% set name = "bbf" %}
{% set version = "0.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/bbf-{{ version }}.tar.gz
  sha256: 8b150f42f55c5e24048b7a34654fcf9e47fd3b8696a61071464b57fe378a4b93

build:
  skip: true  # [py<311 or py>=313 or win]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - cmake >=3.18
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - make
    - python  # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - nanobind >=1.3.2  # [build_platform != target_platform]
  host:
    - python
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - scikit-build-core >=0.4.3
    - nanobind >=1.3.2
    - pip
  run:
    - python
    - astropy
    - gaiaxpy
    - getcalspec
    - healpy
    - matplotlib-base
    - numpy >=2
    - pandas
    - platformdirs
    - scikit-sparse
    - scipy >=1.10
    - sncosmo >=2.12
    - sparse_dot_mkl  # [not arm64]

test:
  imports:
    - bbf
  commands:
    - pip install lemaitre-bandpasses==0.4.0
    - pytest -v tests
  source_files:
    - tests
  requires:
    - git
    - git-lfs
    - numba>=0.60.0  # from pandas[parquet,performance]->lemaitre-bandpasses==0.4.0
    - pip
    - pytest
    - pytest-cov

about:
  home: https://gitlab.in2p3.fr/lemaitre/bbf
  summary: Fast computation of broadband fluxes and magnitudes
  description: A module to evaluate the broadband fluxes and magnitudes of spectrophotometric standards.

  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mmmaat
